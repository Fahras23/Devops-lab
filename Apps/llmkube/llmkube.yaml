apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: llmkube
  namespace: argocd
spec:
  project: default
  sources:
    - chart: llmkube
      repoURL: https://defilantech.github.io/LLMKube
      targetRevision: 0.7.5
      helm:
        valueFiles:
        - $values/llmkube_values.yaml
    - repoURL: 'https://github.com/Fahras23/helm_values.git'
      ref: values
  destination:
    server: "https://kubernetes.default.svc"
    namespace: llmkube