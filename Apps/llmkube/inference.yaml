apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: gemma-e2b-service
  namespace: llmkube
spec:
  runtime: llamacpp
  modelRef: gemma-e2b
  replicas: 1
  endpoint:
    port: 8080
    path: /v1/chat/completions
    type: NodePort
  resources:
    cpu: "1"
    memory: "4Gi"