apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: llama
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Fahras23/Devops-lab.git
    targetRevision: HEAD
    path: Apps/llama
  destination:
    server: https://kubernetes.default.svc
    namespace: llmkube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true